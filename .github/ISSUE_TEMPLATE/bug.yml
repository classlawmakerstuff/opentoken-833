name: Bug Report
description: File a bug report
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. Run '...'
        2. See error
  - type: input
    id: version
    attributes:
      label: OpenToken version
      description: Output of `npm list -g @mrgray17/opentoken` or git commit hash.
    validations:
      required: true
  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      description: `opencode --version`
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Check `~/.config/opentoken/error.jsonl` for error entries.
      render: text
  - type: textarea
    id: config
    attributes:
      label: OpenToken config
      description: Contents of `~/.config/opencode/token/config.json` (if it exists).
      render: json
